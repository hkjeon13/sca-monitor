name: CI

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  smoke:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    env:
      SCA_MONITOR_POSTGRES_DOCKER_SMOKE: required
      SCA_MONITOR_CI_HTTP_SMOKE: disabled
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e . pytest

      - name: Run CI smoke gates
        run: bash scripts/ci_smoke.sh
